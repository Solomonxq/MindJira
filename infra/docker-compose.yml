networks:
  mindjira:
    name: mindjira
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindjira-postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - mindjira
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mindjira-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - mindjira
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  traefik:
    image: traefik:v2.11
    container_name: mindjira-traefik
    command:
      - "--api=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--ping=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mindjira
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping=true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  auth-service:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: mindjira-auth
    env_file:
      - ../.env
    networks:
      - mindjira
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.middlewares=auth-strip"
      - "traefik.http.middlewares.auth-strip.stripprefix.prefixes=/auth"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"

  gateway-service:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: mindjira-gateway
    env_file:
      - ../.env
    networks:
      - mindjira
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/gateway`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.middlewares=gateway-strip"
      - "traefik.http.middlewares.gateway-strip.stripprefix.prefixes=/gateway"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"

  description-enricher-service:
    build:
      context: ..
      dockerfile: services/description-enricher/Dockerfile
    container_name: mindjira-description-enricher
    env_file:
      - ../.env
    networks:
      - mindjira
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.description-enricher.rule=PathPrefix(`/description-enricher`)"
      - "traefik.http.routers.description-enricher.entrypoints=web"
      - "traefik.http.routers.description-enricher.middlewares=description-enricher-strip"
      - "traefik.http.middlewares.description-enricher-strip.stripprefix.prefixes=/description-enricher"
      - "traefik.http.services.description-enricher.loadbalancer.server.port=8000"

  sprint-summary-service:
    build:
      context: ..
      dockerfile: services/sprint-summary/Dockerfile
    container_name: mindjira-sprint-summary
    env_file:
      - ../.env
    networks:
      - mindjira
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sprint-summary.rule=PathPrefix(`/sprint-summary`)"
      - "traefik.http.routers.sprint-summary.entrypoints=web"
      - "traefik.http.routers.sprint-summary.middlewares=sprint-summary-strip"
      - "traefik.http.middlewares.sprint-summary-strip.stripprefix.prefixes=/sprint-summary"
      - "traefik.http.services.sprint-summary.loadbalancer.server.port=8000"

  test-case-generator-service:
    build:
      context: ../services/test-case-generator
      dockerfile: Dockerfile
    container_name: mindjira-test-case-generator
    env_file:
      - ../.env
    networks:
      - mindjira
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.test-case-generator.rule=PathPrefix(`/test-case-generator`)"
      - "traefik.http.routers.test-case-generator.entrypoints=web"
      - "traefik.http.routers.test-case-generator.middlewares=test-case-generator-strip"
      - "traefik.http.middlewares.test-case-generator-strip.stripprefix.prefixes=/test-case-generator"
      - "traefik.http.services.test-case-generator.loadbalancer.server.port=8000"
