[project]
name = "ai-client"
version = "0.1.0"
description = "Shared AI client library for MindJira"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "openai",
    "pydantic",
    "pydantic-settings",
    "sqlalchemy",
    "tenacity",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ai_client"]
