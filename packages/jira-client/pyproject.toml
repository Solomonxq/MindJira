[project]
name = "jira-client"
version = "0.1.0"
description = "Shared Jira REST API v3 client"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.7.4",
    "pydantic-settings>=2.3.3",
    "redis>=5.0.0",
    "tenacity>=8.3.0",
    "structlog>=24.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["jira_client"]
